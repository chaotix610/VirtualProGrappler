<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Pro Grappler</title>
  <style>
    @font-face {
      font-family: "VPG XFiles";
      src: url("/assets/xfiles-0IbJbkZ2.ttf") format("truetype");
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      color-scheme: dark;
      --vpg-frame-color: #ffffff;
      --vpg-frame-width: 1px;
      --vpg-panel-bg: rgba(54, 45, 187, 0.35);
      --vpg-panel-glow: #add8e6;
      --vpg-modal-bg: #1a0d4a;
      --vpg-modal-border: #b8e0f0;
      --vpg-modal-backdrop: rgba(0, 0, 0, 0.45);
      --vpg-font-display: "VPG XFiles", Impact, Arial Black, sans-serif;
      --vpg-font-body: Impact, Arial Black, sans-serif;
      --vpg-item-size: clamp(18px, 2.1vw, 28px);
      --vpg-item-color-idle: #ffffff;
      --vpg-item-color-active: #f28f3d;
      --vpg-item-color-disabled: #888888;
      --vpg-item-stroke: #000000;
      --vpg-state-transition: 0.2s ease;
      --vpg-page-transition: 0.25s ease-out;
      --vpg-modal-transition: 0.18s ease-out;
      background: #050507;
      font-family: var(--vpg-font-body);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050507;
      color: #fff;
    }

    button {
      font: inherit;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 2;
      pointer-events: none;
    }

    #vpg-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 160ms ease, visibility 160ms ease;
      z-index: 1;
    }

    #vpg-canvas[data-active="true"] {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .vpg-stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #050507;
      transition: opacity 150ms ease, visibility 150ms ease;
      pointer-events: auto;
    }

    .vpg-stage[data-active="false"] {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .vpg-menu-background {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(180deg, rgba(5, 5, 10, 0.05), rgba(0, 0, 0, 0.25)),
        url("/assets/mainmenu_bg-2HsVWTA4.png");
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      transform: scale(1.6);
      transform-origin: 22% 52%;
      transition:
        transform 400ms ease-in-out,
        transform-origin 650ms ease-in-out;
      will-change: transform, transform-origin;
    }

    .vpg-stage[data-page="multi-play"] .vpg-menu-background {
      transform-origin: 18% 54%;
    }

    .vpg-stage[data-page="single-play"] .vpg-menu-background {
      transform-origin: 50% 51%;
    }

    .vpg-stage[data-page="commissioner"] .vpg-menu-background {
      transform-origin: 82% 52%;
    }

    .vpg-stage[data-zoom="out"] .vpg-menu-background {
      transform: scale(1);
      transform-origin: 50% 50%;
    }

    .vpg-menu-chrome {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .vpg-menu-panel {
      position: fixed;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 150ms ease, visibility 150ms ease;
    }

    .vpg-menu-panel[data-active="true"] {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .vpg-menu-panel[data-page="multi-play"] { --vpg-title-accent: #e8442b; }
    .vpg-menu-panel[data-page="single-play"] { --vpg-title-accent: #3ec0e8; }
    .vpg-menu-panel[data-page="commissioner"] { --vpg-title-accent: #5fe83e; }

    .vpg-menu-frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .vpg-menu-titlebar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 11vh;
      min-height: 72px;
      border: var(--vpg-frame-width) solid var(--vpg-frame-color);
      border-left: 0;
      border-top: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.32), rgba(255,255,255,0.03)),
        url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAmkAAABECAYAAADa3KITAAAACXBIWXMAAA7DAAAOwwHHb6hkAAAAGXRFWHRTb2Z0d2FyZQB3d3cuaW5rc2NhcGUub3Jnm+48GgAADgJJREFUeJzt3dtyG9eVBuC11t69u3cfAJCiZCu2EyXyzDgaaxybzmTGh0RxHCWVmlu9QF7E5RfJC+h2HoAXc6s7F6+UGVsug2dSFEQCaPTeay7YkCiZkkhHpiDq/6pQFEUA1awCyJ/79LOqUosPfeRDnwMAAADAj0cP3aafk20/mYYyISLT3mR7e1uIiObn50/1SgEAAADOsu3tbSIimp+fj0QUiSi0t9jeRVlVmYh4eXnZXrlyJSGidHNzM7PWJsxsmFlexMUDAAAAnGWqGlU1NE0zWVhYGBHReHl5eXLlypWGDoU0Q0Tp+vp66b3vxhg7qlows0NIAwAAAHj+2pBWM/OeiNwbDoe7Fy5cuE9EYyIKrKpCRMlgMCiJ6Bwzvx5CeJ2I5pg5o4MpUKJH50oBAAAA4OQOr/uPqjoioh1jzKqqrhLRVlVV94loYts7GmNM2jRNN8Z4kYguEdF5IsraJ2mIKDJzjDESAAAAAJyMiFA7OCb0cF/AiIg2QgjMzENr7X0iGhJRY5eWlvjdd9811lpnrS2IaK5p4oW//e2/PxERiTE2MeokhBhUNTJjNA0AAADgpFSJmVmMESPCiYjYGGP861//63+slV0iKuq6dvv7++arr75iW1UViwi3mwRcCMGrqhdhc7CYLYzrejIMQesYY9BDZ3YAAAAAwPEwM4uIMYadc4lPEhYREVX1MUZvjHHMbESEq6piO30QM0sIod3NqaRKzWTSjIbDenc4HN+r68mwaUKDkAYAAABwcszM1hrrXOK91w4RUZIkafu1BzmMmZno4XzoYzSEECZ1PRkOh+N7d+8OdobDeq+um4m2TusbAgAAAHjZtQNi7JxNvHcFEZG1koiIEGk46jFHhTRVpRCCNiHEcV1Phvv7o71794aD8biehICdAwAAAAAnZYxImrpENVKWucx7V1sbgyoFOuIEje+FtHaUTFU1hhBDXU+aug71eFxP9vfHdYxRY8RIGgAAAMBxiTCLCBMR1bWrQ4iTEGJoR9GOnKV8wnQnKTMpM6sqaQhBQ4ixaUIMIWAkDQAAAOAEQiAyxkgIMYYQVPUgZ7VfPnLw60kh7eARD59AY3y4Fg0jaQAAAADHJ8KsqtPZyOkK/6fmKVQ+AQAAAMwghDQAAACAGYSQBgAAADCDENIAAAAAZhBCGgAAAMAMQkgDAAAAmEEIaQAAAAAz6KnnpAEAAJwWkYNSaYCzipm5fZ3zQYm6PvU1j5AGAAAvzOFgNq3MATiLmJmtNWKMiDGGmYmJaPqaP/K1j5AGAAAvRHsCO4sIW2vYWiOqytZahDU4g5SnBevO2URErDFimFmoHVl7vL4TIQ0AAE7VdPRMRDhJrEkSa6wV61xiD0YZRIgOfmu92CsFeK7YGMPO2aQosiLLnLfWOBGxzGToiNE0hDQAADg104BmjBHnrEnTxBWFd96nmXM2TRJrmckYYxDQ4Ezhg1VobK2xziU+z9OOc4kX4YSIzVGPQUgDAIBTIcIsItMpH5umNi3L3Hc6Re69Kw+NLJh2vQ7AmcEsxEzMTMZa65LE5sZILiISY2RVjkQU0zSNe3t7SoSQBgAAP7LHpzfTNLHeO19VRd7tFlVRZB3v08o5m4lIQkQswhSjPuOZAV4u7d4YadejJSIiqhqZeaSqI1WtVTXEGHUwGChCGgAA/Ggen97MMpcURearKi+rKu9UVd7NMld5n6a//e17a++889NdIgrtTdsbwJnAzKSqQkSmvTERjVR1g5l3mHlvb29vEkKI165dQ0gDAIAfx8OAJiZNE5PnmStLn5elLzudvFsUWdf7tJqbq+iPf/zwm9dem78XYxwy81BVa       clip-path: polygon(0 0, 100% 0, 100% 62%, 76% 62%, 70% 100%, 0 100%);
      pointer-events: none;
    }

    .vpg-menu-titlebar::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 1px;
      background: rgba(255, 255, 255, 0.75);
    }

    .vpg-menu-title-logo {
      height: min(8vh, 62px);
      max-width: min(38vw, 440px);
      object-fit: contain;
      margin: 0.9vh 0 0 2.3vw;
      filter:
        drop-shadow(2px 2px 0 #000)
        drop-shadow(0 0 6px color-mix(in srgb, var(--vpg-title-accent) 75%, transparent));
    }

    .vpg-menu-items {
      position: absolute;
      top: max(11vh, 72px);
      left: 0;
      bottom: 0;
      width: clamp(260px, 26vw, 430px);
      display: flex;
      flex-direction: column;
      gap: clamp(8px, 1.35vh, 16px);
      padding: clamp(18px, 4vh, 42px) 1.2vw 2.5vh 2.6vw;
      list-style: none;
      border-right: var(--vpg-frame-width) solid var(--vpg-frame-color);
      border-bottom: var(--vpg-frame-width) solid var(--vpg-frame-color);
      background: var(--vpg-panel-bg);
      box-shadow:
        inset 0 0 16px color-mix(in srgb, var(--vpg-panel-glow) 72%, transparent),
        inset -1px 0 0 rgba(255, 255, 255, 0.35);
      pointer-events: auto;
    }

    .vpg-menu-item {
      min-height: clamp(30px, 5.3vh, 52px);
      display: flex;
      align-items: center;
      color: var(--vpg-item-color-idle);
      font-family: var(--vpg-font-display);
      font-size: var(--vpg-item-size);
      line-height: 1;
      letter-spacing: 0;
      text-transform: none;
      cursor: pointer;
      transition: color var(--vpg-state-transition), filter var(--vpg-state-transition), transform var(--vpg-state-transition);
      -webkit-text-stroke: 0.5px var(--vpg-item-stroke);
      text-shadow:
        2px 2px 0 #000,
        0 0 1px #000;
      white-space: nowrap;
    }

    .vpg-menu-item[data-state="active"] {
      color: var(--vpg-item-color-active);
      -webkit-text-stroke: 2px var(--vpg-item-stroke);
      animation: glowPulse 900ms ease-in-out infinite alternate;
      transform: translateX(3px);
    }

    .vpg-menu-item[data-state="disabled"] {
      color: var(--vpg-item-color-disabled);
      animation: none;
      cursor: default;
    }

    .vpg-menu-item:focus-visible,
    .vpg-control-row:focus-visible,
    .vpg-confirm-option:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 3px;
    }

    @keyframes glowPulse {
      from {
        filter: drop-shadow(0 0 1px #fff) drop-shadow(0 0 4px #f28f3d);
      }
      to {
        filter: drop-shadow(0 0 3px #fff) drop-shadow(0 0 11px #f28f3d);
      }
    }

    .vpg-instructions-backdrop {
      position: fixed;
      inset: 0;
      z-index: 5;
      background: var(--vpg-modal-backdrop);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--vpg-modal-transition);
    }

    .vpg-instructions-backdrop[data-state="visible"] {
      opacity: 1;
      pointer-events: auto;
    }

    .vpg-instructions-modal,
    .vpg-confirm-dialog {
      position: fixed;
      z-index: 6;
      left: 50%;
      top: 50%;
      width: min(680px, 72vw);
      min-height: 220px;
      padding: 24px 32px 28px;
      color: #fff;
      background: var(--vpg-modal-bg);
      border: 2px solid var(--vpg-modal-border);
      box-shadow:
        0 0 0 2px rgba(8, 22, 82, 0.95),
        0 0 0 5px rgba(184, 224, 240, 0.55),
        0 22px 42px rgba(0, 0, 0, 0.6),
        inset 0 0 22px rgba(184, 224, 240, 0.18);
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.96);
      pointer-events: none;
      transition: opacity var(--vpg-modal-transition), transform var(--vpg-modal-transition);
    }

    .vpg-instructions-modal[data-state="visible"],
    .vpg-confirm-dialog[data-state="visible"] {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    .vpg-instructions-title {
      margin-bottom: 24px;
      font-size: clamp(22px, 2.6vw, 34px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      color: #fff;
      text-shadow: 2px 2px 0 #000;
    }

    .vpg-instructions-body {
      display: flex;
      flex-direction: column;
      gap: 16px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(16px, 1.35vw, 21px);
      line-height: 1.35;
    }

    .vpg-instructions-body dl {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(90px, 0.5fr);
      column-gap: clamp(34px, 6vw, 84px);
      row-gap: 12px;
      width: min(100%, 520px);
      margin: 0 auto;
    }

    .vpg-instructions-body dt {
      text-align: left;
    }

    .vpg-instructions-body dd {
      text-align: right;
    }

    .vpg-route-status {
      position: fixed;
      right: 24px;
      bottom: 22px;
      z-index: 4;
      padding: 9px 14px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      background: rgba(10, 10, 28, 0.8);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .vpg-route-status[data-state="visible"] {
      opacity: 1;
      transform: translateY(0);
    }

    .vpg-subscreen {
      position: fixed;
      inset: 0;
      z-index: 4;
      overflow: auto;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.32)),
        url("/assets/mainmenu_bg-2HsVWTA4.png") center / cover no-repeat;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 150ms ease, visibility 150ms ease;
    }

    .vpg-subscreen[data-active="true"] {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .vpg-text-titlebar {
      position: sticky;
      min-height: 72px;
      z-index: 1;
    }

    .vpg-text-title {
      margin-left: 2.5vw;
      padding-top: 1.1vh;
      color: #f28f3d;
      font-family: var(--vpg-font-display);
      font-size: clamp(34px, 5vw, 62px);
      line-height: 1;
      letter-spacing: 0;
      -webkit-text-stroke: 2px #000;
      text-shadow: 3px 3px 0 #000;
    }

    .vpg-arena-page {
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.16));
    }

    .vpg-arena-page[data-active="true"] {
      pointer-events: none;
    }

    .vpg-arena-page .vpg-menu-titlebar,
    .vpg-arena-grid {
      pointer-events: auto;
    }

    .vpg-arena-status {
      position: absolute;
      right: 28px;
      bottom: 13px;
      max-width: 38vw;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: 800;
      text-align: right;
      text-transform: uppercase;
      text-shadow: 2px 2px 0 #000;
    }

    .vpg-subscreen-panel {
      width: min(760px, calc(100vw - 28px));
      margin: max(11vh, 82px) 0 28px 0;
      padding: 18px clamp(14px, 2vw, 26px);
      border-right: var(--vpg-frame-width) solid var(--vpg-frame-color);
      border-bottom: var(--vpg-frame-width) solid var(--vpg-frame-color);
      background: var(--vpg-panel-bg);
      box-shadow: inset 0 0 16px color-mix(in srgb, var(--vpg-panel-glow) 72%, transparent);
    }

    .vpg-controls-rows {
      display: grid;
