<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Pro Grappler</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 196, 0, 0.18), transparent 30%),
        linear-gradient(180deg, #1e0710 0%, #12040a 42%, #050505 100%);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      color: #fff3d0;
    }

    body {
      position: relative;
    }

    #app {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
      padding: 18px 18px 24px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 120ms ease;
      pointer-events: none;
    }

    .screen[data-active="true"] {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .main-menu-screen {
      justify-content: center;
      gap: 24px;
      background:
        linear-gradient(180deg, rgba(11, 3, 3, 0.35), rgba(0, 0, 0, 0.55));
    }

    .menu-marquee {
      width: min(100%, 780px);
      padding: 22px 24px 18px;
      border: 2px solid rgba(255, 207, 87, 0.7);
      background:
        linear-gradient(180deg, rgba(119, 20, 20, 0.95), rgba(43, 4, 4, 0.96));
      box-shadow:
        0 0 0 2px rgba(37, 2, 2, 0.8),
        0 18px 36px rgba(0, 0, 0, 0.45);
    }

    .menu-eyebrow {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      color: #ffe299;
      margin-bottom: 8px;
    }

    .menu-title,
    .viewer-title {
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
      color: #ffd54f;
      text-shadow:
        0 2px 0 #8a1919,
        0 4px 18px rgba(0, 0, 0, 0.9);
    }

    .menu-subtitle {
      margin-top: 10px;
      font-size: 14px;
      color: #ffe9b0;
    }

    .menu-panel {
      width: min(100%, 780px);
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(240px, 0.8fr);
      gap: 14px;
      pointer-events: auto;
    }

    .menu-list,
    .menu-detail,
    .viewer-toolbar,
    .test-card {
      border: 2px solid rgba(255, 207, 87, 0.65);
      background:
        linear-gradient(180deg, rgba(82, 10, 10, 0.94), rgba(29, 4, 4, 0.94));
      box-shadow:
        0 0 0 2px rgba(55, 0, 0, 0.7),
        0 14px 26px rgba(0, 0, 0, 0.45);
    }

    .menu-list {
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 8px;
      pointer-events: auto;
    }

    .menu-option {
      width: 100%;
      min-height: 56px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      border: 2px solid rgba(255, 207, 87, 0.22);
      background:
        linear-gradient(180deg, rgba(24, 24, 24, 0.94), rgba(10, 10, 10, 0.96));
      color: #fff3d0;
      font: inherit;
      text-transform: uppercase;
      cursor: pointer;
      text-align: left;
    }

    .menu-option:hover,
    .menu-option[data-selected="true"] {
      border-color: #ffd45a;
      background:
        linear-gradient(90deg, rgba(154, 24, 24, 0.95), rgba(87, 9, 9, 0.95));
      color: #fff9e0;
    }

    .menu-option:focus-visible,
    .arena-select-trigger:focus-visible,
    .arena-select-option:focus-visible {
      outline: 2px solid #ffffff;
      outline-offset: 2px;
    }

    .menu-option-index {
      flex: 0 0 36px;
      font-size: 12px;
      font-weight: 900;
      color: #ffb95f;
    }

    .menu-option-label {
      font-size: 18px;
      font-weight: 900;
    }

    .menu-detail {
      min-height: 220px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .menu-detail-title {
      font-size: 20px;
      font-weight: 900;
      text-transform: uppercase;
      color: #ffe89f;
    }

    .menu-detail-text {
      font-size: 14px;
      line-height: 1.45;
      color: #fff0c5;
    }

    .viewer-toolbar {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-height: 52px;
      padding: 10px 14px;
      pointer-events: auto;
    }

    .viewer-label {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      color: #ffecac;
    }

    .viewer-status {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      color: #ffb95f;
    }

    .arena-select {
      position: relative;
      min-width: 280px;
    }

    .arena-select-trigger {
      width: 100%;
      min-height: 40px;
      border: 2px solid #f4cf63;
      background:
        linear-gradient(180deg, #262626 0%, #0f0f0f 100%);
      color: #fff4c8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 12px;
      font: inherit;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .arena-select-trigger-text {
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .arena-select-trigger-hint {
      flex: 0 0 auto;
      font-size: 10px;
      font-weight: 700;
      color: #ff9f43;
    }

    .arena-select-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      list-style: none;
      border: 2px solid #f4cf63;
      background:
        linear-gradient(180deg, rgba(24, 24, 24, 0.98), rgba(10, 10, 10, 0.98));
      box-shadow:
        0 0 0 2px rgba(55, 0, 0, 0.7),
        0 16px 28px rgba(0, 0, 0, 0.55);
      overflow: hidden;
    }

    .arena-select-option {
      min-height: 38px;
      display: flex;
      align-items: center;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      color: #fff3d0;
    }

    .arena-select-option + .arena-select-option {
      border-top: 1px solid rgba(255, 207, 87, 0.2);
    }

    .arena-select-option:hover,
    .arena-select-option[aria-selected="true"] {
      background:
        linear-gradient(90deg, rgba(154, 24, 24, 0.95), rgba(87, 9, 9, 0.95));
      color: #fff9e0;
    }

    .test-screen {
      justify-content: center;
      gap: 18px;
      background:
        linear-gradient(180deg, rgba(11, 3, 3, 0.28), rgba(0, 0, 0, 0.5));
    }

    .test-card {
      width: min(100%, 720px);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: auto;
    }

    .test-card-header {
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      color: #ffe89f;
    }

    .test-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .test-row {
      min-height: 42px;
      display: grid;
      grid-template-columns: minmax(0, 180px) minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 207, 87, 0.22);
      background:
        linear-gradient(180deg, rgba(24, 24, 24, 0.94), rgba(10, 10, 10, 0.96));
    }

    .test-row-label {
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      color: #ffb95f;
    }

    .test-row-value {
      font-size: 14px;
      font-weight: 700;
      color: #fff3d0;
    }

    .screen-footer {
      pointer-events: none;
      margin-top: auto;
      padding: 8px 14px;
      border: 1px solid rgba(255, 207, 87, 0.4);
      background: rgba(10, 10, 10, 0.78);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      color: #ffe7a3;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.35);
    }

    #vpg-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      transition: filter 120ms ease, opacity 120ms ease;
    }

    #vpg-canvas[data-dimmed="true"] {
      filter: saturate(0.75) brightness(0.42);
      opacity: 0.95;
    }

    @media (max-width: 640px) {
      .screen {
        padding: 14px 12px 20px;
      }

      .menu-title,
      .viewer-title {
        font-size: 26px;
      }

      .menu-panel {
        grid-template-columns: 1fr;
      }

      .viewer-toolbar {
        width: 100%;
        justify-content: space-between;
        gap: 10px;
      }

      .arena-select {
        min-width: 0;
        width: min(100%, 260px);
      }

      .arena-select-trigger-text {
        font-size: 13px;
      }

      .test-row {
        grid-template-columns: 1fr;
        align-items: flex-start;
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-BSc5uCLs.js"></script>
</head>
<body>
  <div id="app"></div>
  <canvas id="vpg-canvas"></canvas>
</body>
</html>
