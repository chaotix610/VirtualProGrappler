<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Pro Grappler</title>
  <style>
    @font-face {
      font-family: "VPG XFiles";
      src: url("/assets/xfiles-0IbJbkZ2.ttf") format("truetype");
      font-display: swap;
    }

    @font-face {
      font-family: "Oswald";
      src: url("/assets/Oswald-Bold-BkrtVJHt.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      color-scheme: dark;
      --vpg-frame-color: #ffffff;
      --vpg-frame-width: 1px;
      --vpg-panel-bg: rgba(54, 45, 187, 0.35);
      --vpg-heading-bg: rgba(54, 45, 187, 0.48);
      --vpg-panel-glow: #add8e6;
      --vpg-modal-bg: #1a0d4a;
      --vpg-modal-border: #b8e0f0;
      --vpg-modal-backdrop: rgba(0, 0, 0, 0.45);
      --vpg-font-display: "VPG XFiles", Impact, Arial Black, sans-serif;
      --vpg-font-body: Oswald, Arial, sans-serif;
      --vpg-font-menu-item: Oswald, sans-serif;
      --vpg-item-size: clamp(26px, 2.65vw, 34px);
      --vpg-item-color-idle: #ffffff;
      --vpg-item-color-active: #f28f3d;
      --vpg-item-color-disabled: #888888;
      --vpg-item-stroke: #000000;
      --vpg-state-transition: 0.2s ease;
      --vpg-page-transition: 0.25s ease-out;
      --vpg-modal-transition: 0.18s ease-out;
      background: #050507;
      font-family: var(--vpg-font-body);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050507;
      color: #fff;
    }

    button {
      font: inherit;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 2;
      pointer-events: none;
    }

    #vpg-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 160ms ease, visibility 160ms ease;
      z-index: 1;
    }

    #vpg-canvas[data-active="true"] {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .vpg-stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #050507;
      transition: opacity 150ms ease, visibility 150ms ease;
      pointer-events: auto;
    }

    .vpg-stage[data-active="false"] {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .vpg-menu-background {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(180deg, rgba(5, 5, 10, 0.05), rgba(0, 0, 0, 0.25)),
        url("/assets/mainmenu_bg-2HsVWTA4.png");
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      transform: scale(1.6);
      transform-origin: 22% 52%;
      transition:
        transform 420ms cubic-bezier(0.45, 0, 0.2, 1),
        transform-origin 420ms cubic-bezier(0.45, 0, 0.2, 1);
      will-change: transform, transform-origin;
    }

    .vpg-stage[data-page="multi-play"] .vpg-menu-background {
      transform-origin: 18% 54%;
    }

    .vpg-stage[data-page="single-play"] .vpg-menu-background {
      transform-origin: 50% 51%;
    }

    .vpg-stage[data-page="commissioner"] .vpg-menu-background {
      transform-origin: 82% 52%;
    }

    .vpg-stage[data-zoom="out"] .vpg-menu-background {
      transform: scale(1);
      transform-origin: 50% 50%;
    }

    .vpg-menu-chrome {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .vpg-menu-panel {
      position: fixed;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 150ms ease, visibility 150ms ease;
    }

    .vpg-menu-panel[data-active="true"] {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .vpg-menu-panel[data-page="multi-play"] { --vpg-title-accent: #e8442b; }
    .vpg-menu-panel[data-page="single-play"] { --vpg-title-accent: #3ec0e8; }
    .vpg-menu-panel[data-page="commissioner"] { --vpg-title-accent: #5fe83e; }

    .vpg-menu-frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .vpg-menu-titlebar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 120px;
      pointer-events: none;
    }

    .vpg-menu-titlebar::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--vpg-heading-bg);
      box-shadow: inset 0 0 12px color-mix(in srgb, var(--vpg-panel-glow) 46%, transparent);
      clip-path: polygon(0% 0%, 100% 0%, 100% 35%, 65% 35%, 55% 100%, 0% 100%);
    }

    .vpg-menu-title-logo {
      position: relative;
      z-index: 1;
      height: min(8vh, 62px);
      max-width: min(38vw, 440px);
      object-fit: contain;
      margin: 18px 0 0 2.3vw;
      filter:
        drop-shadow(2px 2px 0 #000)
        drop-shadow(0 0 6px color-mix(in srgb, var(--vpg-title-accent) 75%, transparent));
    }

    .vpg-menu-items {
      position: absolute;
      top: 120px;
      left: 0;
      bottom: 0;
      width: clamp(260px, 26vw, 430px);
      display: flex;
      flex-direction: column;
      gap: clamp(8px, 1.35vh, 16px);
      padding: clamp(18px, 4vh, 42px) 1.2vw 2.5vh 2.6vw;
      list-style: none;
      background: var(--vpg-panel-bg);
      box-shadow: inset 0 0 16px color-mix(in srgb, var(--vpg-panel-glow) 72%, transparent);
      pointer-events: auto;
    }

    .vpg-menu-item {
      position: relative;
      min-height: 38px;
      display: flex;
      align-items: center;
      color: var(--vpg-item-color-idle);
      background: transparent;
      border: none;
      padding: 10px 20px;
      margin: 4px;
      font-family: var(--vpg-font-menu-item);
      font-size: var(--vpg-item-size);
      font-weight: 700;
      line-height: 18px !important;
      letter-spacing: -2px;
      text-decoration: none;
      cursor: pointer;
      -webkit-text-stroke: 0.5px var(--vpg-item-stroke);
      -webkit-text-fill-color: #ffffff;
      transition:
        -webkit-text-fill-color var(--vpg-state-transition),
        -webkit-text-stroke-width var(--vpg-state-transition);
      white-space: nowrap;
    }

    .vpg-menu-item:hover,
    .vpg-menu-item:focus,
    .vpg-menu-item[data-state="active"] {
      -webkit-text-fill-color: var(--vpg-item-color-active);
      -webkit-text-stroke-width: 2px;
      animation: glowPulse 1s ease-in-out infinite;
    }

    .vpg-menu-item[data-state="disabled"] {
      color: var(--vpg-item-color-disabled);
      animation: none;
      cursor: default;
    }

    .vpg-menu-item:focus-visible,
    .vpg-control-row:focus-visible,
    .vpg-confirm-option:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 3px;
    }

    @keyframes glowPulse {
      0%, 100% {
        text-shadow:
          -15px 0 8px rgba(0, 248, 37, 0.5),
          15px 0 8px rgba(0, 248, 37, 0.5),
          25px 0 8px rgba(0, 248, 37, 0.5),
          -25px 0 8px rgba(0, 248, 37, 0.5);
      }

      50% {
        text-shadow:
          -35px 0 25px rgba(0, 248, 37, 1),
          35px 0 25px rgba(0, 248, 37, 1),
          45px 0 25px rgba(0, 248, 37, 1),
          -45px 0 25px rgba(0, 248, 37, 1),
          0 0 30px rgba(0, 248, 37, 0.8);
      }
    }

    .vpg-instructions-backdrop {
      position: fixed;
      inset: 0;
      z-index: 5;
      background: var(--vpg-modal-backdrop);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--vpg-modal-transition);
    }

    .vpg-instructions-backdrop[data-state="visible"] {
      opacity: 1;
      pointer-events: auto;
    }

    .vpg-instructions-modal,
    .vpg-confirm-dialog {
      position: fixed;
      z-index: 6;
      left: 50%;
      top: 50%;
      width: min(680px, 72vw);
      min-height: 220px;
      padding: 24px 32px 28px;
      color: #fff;
      background: var(--vpg-modal-bg);
      border: 2px solid var(--vpg-modal-border);
      box-shadow:
        0 0 0 2px rgba(8, 22, 82, 0.95),
        0 0 0 5px rgba(184, 224, 240, 0.55),
        0 22px 42px rgba(0, 0, 0, 0.6),
        inset 0 0 22px rgba(184, 224, 240, 0.18);
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.96);
      pointer-events: none;
      transition: opacity var(--vpg-modal-transition), transform var(--vpg-modal-transition);
    }

    .vpg-instructions-modal[data-state="visible"],
    .vpg-confirm-dialog[data-state="visible"] {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    .vpg-instructions-title {
      margin-bottom: 24px;
      font-size: clamp(22px, 2.6vw, 34px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      color: #fff;
      text-shadow: 2px 2px 0 #000;
    }

    .vpg-instructions-body {
      display: flex;
      flex-direction: column;
      gap: 16px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(16px, 1.35vw, 21px);
      line-height: 1.35;
    }

    .vpg-instructions-body dl {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(90px, 0.5fr);
      column-gap: clamp(34px, 6vw, 84px);
      row-gap: 12px;
      width: min(100%, 520px);
      margin: 0 auto;
    }

    .vpg-instructions-body dt {
      text-align: left;
    }

    .vpg-instructions-body dd {
      text-align: right;
    }

    .vpg-route-status {
      position: fixed;
      right: 24px;
      bottom: 22px;
      z-index: 4;
      padding: 9px 14px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      background: rgba(10, 10, 28, 0.8);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .vpg-route-status[data-state="visible"] {
      opacity: 1;
      transform: translateY(0);
    }

    .vpg-subscreen {
      position: fixed;
      inset: 0;
      z-index: 4;
      overflow: auto;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.32)),
        url("/assets/menu_bg-BGkKnW0z.png") center / cover no-repeat;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 150ms ease, visibility 150ms ease;
    }

    .vpg-subscreen[data-active="true"] {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .vpg-text-titlebar {
      position: sticky;
      height: 120px;
      min-height: 72px;
      z-index: 1;
    }

    .vpg-text-title {
      margin-left: 2.5vw;
      padding-top: 1.1vh;
      color: #f28f3d;
      font-family: var(--vpg-font-display);
      font-size: clamp(34px, 5vw, 62px);
      line-height: 1;
      letter-spacing: 0;
      -webkit-text-stroke: 2px #000;
      text-shadow: 3px 3px 0 #000;
    }

    .vpg-arena-page {
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.32)),
        url("/assets/menu_bg-BGkKnW0z.png") center / cover no-repeat;
    }

    .vpg-arena-page[data-active="true"] {
      pointer-events: auto;
    }

    .vpg-arena-page[data-mode="scene"] {
      background: transparent;
      pointer-events: none;
    }

    .vpg-arena-page[data-mode="scene"] .vpg-menu-titlebar,
    .vpg-arena-page[data-mode="scene"] .vpg-arena-select-layout {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .vpg-arena-status {
      position: absolute;
      right: 28px;
      bottom: 13px;
      max-width: 38vw;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      font-weight: 800;
      text-align: right;
      text-transform: uppercase;
      text-shadow: 2px 2px 0 #000;
    }

    .vpg-subscreen-panel {
      width: min(760px, calc(100vw - 28px));
      margin: max(11vh, 82px) 0 28px 0;
      padding: 18px clamp(14px, 2vw, 26px);
      background: var(--vpg-panel-bg);
      box-shadow: inset 0 0 16px color-mix(in srgb, var(--vpg-panel-glow) 72%, transparent);
    }

    .vpg-controls-page {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .vpg-controls-page .vpg-text-titlebar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
    }

    .vpg-controls-page .vpg-subscreen-panel {
      margin: 0;
    }

    .vpg-controls-rows {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 14px;
    }

    .vpg-control-row {
      min-height: 42px;
      display: grid;
      grid-template-columns: minmax(120px, 0.85fr) minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      padding: 7px 10px;
      border: 0;
      background: transparent;
      color: #fff;
      text-align: left;
      cursor: pointer;
      -webkit-text-stroke: 0.5px #000;
      text-shadow: 2px 2px 0 #000;
    }

    .vpg-control-row[data-state="active"] {
      color: var(--vpg-item-color-active);
      -webkit-text-stroke: 1.5px #000;
      animation: glowPulse 900ms ease-in-out infinite alternate;
    }

    .vpg-control-row[data-listening="true"] .vpg-control-binding {
      color: #b8e0f0;
    }

    .vpg-control-action {
      grid-template-columns: 1fr;
      margin-top: 8px;
    }

    .vpg-control-button-art {
      height: 28px;
      width: auto;
      image-rendering: pixelated;
      filter: drop-shadow(2px 2px 0 #000);
    }

    .vpg-control-binding {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      color: #fff;
      -webkit-text-stroke: 0;
      text-shadow: 1px 1px 0 #000;
    }

    .vpg-confirm-dialog {
      width: min(360px, 82vw);
      min-height: 130px;
      text-align: center;
      font-size: 20px;
    }

    .vpg-confirm-actions {
      display: flex;
      justify-content: center;
      gap: 22px;
      margin-top: 22px;
    }

    .vpg-confirm-option {
      border: 0;
      background: transparent;
      color: #fff;
      cursor: pointer;
      -webkit-text-stroke: 1px #000;
      text-shadow: 2px 2px 0 #000;
    }

    .vpg-confirm-option[data-state="active"] {
      color: var(--vpg-item-color-active);
      animation: glowPulse 900ms ease-in-out infinite alternate;
    }

    .vpg-arena-select-layout {
      display: grid;
      grid-template-columns: minmax(250px, 30vw) minmax(320px, 1fr);
      align-items: start;
      gap: clamp(24px, 5vw, 72px);
      width: min(1180px, calc(100vw - 64px));
      margin: max(13vh, 120px) auto 28px;
      transition: opacity 140ms ease, visibility 140ms ease;
    }

    .vpg-arena-list {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding-left: clamp(18px, 4vw, 52px);
    }

    .vpg-arena-menu-item {
      max-width: min(430px, 34vw);
      white-space: normal;
      text-align: left;
    }

    .vpg-arena-preview {
      justify-self: stretch;
      min-height: min(54vh, 420px);
      display: grid;
      align-content: center;
      gap: 12px;
      color: #fff;
      text-shadow: 2px 2px 0 #000;
    }

    .vpg-arena-preview-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      background: rgba(0, 0, 0, 0.36);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.48);
    }

    .vpg-arena-preview[data-empty="true"] .vpg-arena-preview-image {
      display: none;
    }

    .vpg-arena-preview-title {
      color: #f28f3d;
      font-family: var(--vpg-font-menu-item);
      font-size: clamp(28px, 3.2vw, 46px);
      font-weight: 700;
      line-height: 1;
      -webkit-text-stroke: 1.5px #000;
    }

    .vpg-arena-preview-copy {
      max-width: 520px;
      color: rgba(255, 255, 255, 0.88);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    @media (max-width: 760px) {
      .vpg-menu-titlebar {
        height: 88px;
        min-height: 64px;
      }

      .vpg-menu-title-logo {
        max-width: 58vw;
        margin-top: 8px;
      }

      .vpg-menu-items {
        top: 88px;
        width: min(82vw, 360px);
        padding-left: 18px;
      }

      .vpg-menu-item {
        white-space: normal;
      }

      .vpg-instructions-modal {
        width: min(90vw, 680px);
        padding: 20px;
      }

      .vpg-instructions-body dl {
        grid-template-columns: 1fr;
        row-gap: 4px;
      }

      .vpg-instructions-body dd {
        margin-bottom: 10px;
        text-align: left;
      }

      .vpg-controls-rows {
        grid-template-columns: 1fr;
      }

      .vpg-control-row {
        grid-template-columns: minmax(100px, 0.8fr) minmax(0, 1fr);
      }

      .vpg-controls-page {
        align-items: flex-start;
        justify-content: flex-start;
        padding-top: 98px;
      }

      .vpg-controls-page .vpg-subscreen-panel {
        margin: 0 auto 24px;
      }

      .vpg-arena-select-layout {
        grid-template-columns: 1fr;
        width: min(88vw, 620px);
        margin-top: 98px;
      }

      .vpg-arena-list {
        padding-left: 0;
      }

      .vpg-arena-menu-item {
        max-width: 100%;
      }

      .vpg-arena-preview {
        min-height: auto;
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-CFSa8zgv.js"></script>
</head>
<body>
  <div id="app"></div>
  <canvas id="vpg-canvas" data-active="false"></canvas>
</body>
</html>
