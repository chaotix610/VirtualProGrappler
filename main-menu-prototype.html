<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VPG Engine — Main Menu Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   VPG Engine — Main Menu
   ========================================================================= */

:root {
  /* Panel chrome */
  --vpg-frame-color: #ffffff;
  --vpg-frame-width: 1px;
  --vpg-titlebar-bg: rgba(160, 165, 195, 0.92);
  --vpg-panel-bg: rgba(54, 45, 187, 0.35);
  --vpg-panel-glow: #ADD8E6;

  /* Typography */
  --vpg-font-display: "Oswald", sans-serif;
  --vpg-item-size: 32px;
  --vpg-item-letter-spacing: -1.5px;

  /* Item state colors */
  --vpg-item-color-idle: #ffffff;
  --vpg-item-color-active: #f28f3d;
  --vpg-item-color-disabled: #888888;
  --vpg-item-stroke: #000000;

  /* Motion */
  --vpg-state-transition: 0.2s ease;
  --vpg-page-transition: 0.25s ease-out;
}

/* ----- Reset & viewport ----- */

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--vpg-font-display);
  background: #000;
  color: #fff;
}

/* ----- Background stage ----- */

.vpg-stage {
  position: fixed;
  inset: 0;
  overflow: hidden;
  background: #000;
}

/* The background image. Sized to fill the viewport at its natural
   1.0 scale (which becomes our "zoomed out" view showing the whole
   room). When zoomed in on a particular page region, we scale it up
   with transform-origin set to the focus point of that region.

   The image is 1376x768 (16:9). At default 1.0 scale, it fills
   100vw x 100vh as `background-size: cover`. */
.vpg-stage-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background-image: url('assets/textures/ui/mainmenu_bg.png');
  background-repeat: no-repeat;
  background-size: cover;
  background-position: center;
  transform-origin: 50% 50%;
  will-change: transform, transform-origin;
}

/* ----- Per-page transform-origins for the zoom-in focus point ----- */
/* Multi Play focuses on the left third (table/cage area).
   Single Play on the middle (staircase).
   Commissioner on the right third (lockers). */
.vpg-stage[data-page="multi-play"]   .vpg-stage-bg { transform-origin: 20% 60%; }
.vpg-stage[data-page="single-play"]  .vpg-stage-bg { transform-origin: 50% 60%; }
.vpg-stage[data-page="commissioner"] .vpg-stage-bg { transform-origin: 80% 60%; }

/* ----- Zoom level ----- */
/* Default (data-zoom not set or = "in"): scaled up to focus on region.
   data-zoom="out": scale 1, showing the whole panorama. */
.vpg-stage                  .vpg-stage-bg { transform: scale(1.6); }
.vpg-stage[data-zoom="out"] .vpg-stage-bg { transform: scale(1); }

/* ----- Per-stage transition timing ----- */
.vpg-stage[data-transition="zooming-out"] .vpg-stage-bg,
.vpg-stage[data-transition="zooming-in"] .vpg-stage-bg {
  transition:
    transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
    transform-origin 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.vpg-stage[data-transition="sliding"] .vpg-stage-bg {
  /* The "slide" is a hold beat at the wide view. The transform-origin
     transitions during this stage so when the zoom-in starts, the
     focus point is already correctly positioned for the new region. */
  transition: transform-origin 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
.vpg-stage:not([data-transition]) .vpg-stage-bg {
  transition: none;
}

/* ----- Status bar (debug / dev only) ----- */

.vpg-status {
  position: fixed;
  bottom: 12px;
  left: 12px;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0;
  background: rgba(0,0,0,0.65);
  color: #aac;
  padding: 6px 10px;
  border-radius: 4px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  z-index: 100;
  user-select: none;
}
.vpg-status kbd {
  background: #222;
  color: #fff;
  padding: 1px 5px;
  border-radius: 2px;
  font: inherit;
}

/* =========================================================================
   Menu panel
   ========================================================================= */

/* =========================================================================
   Menu panel — full-viewport overlay
   All three pages occupy the same screen position. Only one is visible
   at a time. The background slides behind them to provide variety.
   ========================================================================= */

.vpg-menu-panel {
  position: fixed;
  inset: 0;

  /* Default: hidden */
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease-out;
}

.vpg-menu-panel[data-active="true"] {
  opacity: 1;
  pointer-events: auto;
}

/* ----- The bordered frame around the whole panel ----- */

.vpg-menu-frame {
  position: relative;
  width: 100%;
  height: 100%;
}

/* ----- Title bar — across top of viewport ----- */

.vpg-menu-titlebar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 11vh;
  background: var(--vpg-titlebar-bg);
  border-bottom: var(--vpg-frame-width) solid var(--vpg-frame-color);
  /* Notched right edge: bar narrows partway across, drops to a thinner
     extension that continues to the right edge */
  clip-path: polygon(
    0 0,
    72% 0,
    78% 50%,
    100% 50%,
    100% 100%,
    0 100%
  );
  display: flex;
  align-items: center;
  padding: 0 32px;
}

.vpg-menu-title-logo {
  height: 75%;
  max-height: 64px;
  width: auto;
  object-fit: contain;
  object-position: left center;
}

/* ----- Item list panel ----- */

/* ----- Item list panel — fixed left column ----- */

.vpg-menu-items {
  position: absolute;
  top: 11vh;
  left: 0;
  bottom: 0;
  width: 26vw;
  background: var(--vpg-panel-bg);
  box-shadow:
    0 0 5px var(--vpg-panel-glow),
    inset 0 0 5px 2px var(--vpg-panel-glow);
  border-right: var(--vpg-frame-width) solid var(--vpg-frame-color);
  border-bottom: var(--vpg-frame-width) solid var(--vpg-frame-color);
  list-style: none;
  padding: 5vh 1vw;
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-items: center;
  justify-content: flex-start;
  overflow: hidden;
}

.vpg-menu-item {
  color: var(--vpg-item-color-idle);
  letter-spacing: var(--vpg-item-letter-spacing);
  -webkit-text-stroke-width: 0.5px;
  -webkit-text-stroke-color: var(--vpg-item-stroke);
  font-family: var(--vpg-font-display);
  font-size: var(--vpg-item-size);
  font-weight: 700;
  background: transparent;
  border: none;
  cursor: pointer;
  text-align: center;
  padding: 1px 6px;
  white-space: nowrap;
  transition:
    -webkit-text-fill-color var(--vpg-state-transition),
    -webkit-text-stroke-width var(--vpg-state-transition);
  user-select: none;
}

.vpg-menu-item[data-state="active"] {
  -webkit-text-fill-color: var(--vpg-item-color-active);
  -webkit-text-stroke-width: 2px;
  animation: vpg-glow-pulse 1.4s ease-in-out infinite;
}

.vpg-menu-item[data-state="disabled"] {
  color: var(--vpg-item-color-disabled);
  cursor: default;
  opacity: 0.6;
}

@keyframes vpg-glow-pulse {
  0%, 100% { text-shadow: 0 0 6px rgba(242, 143, 61, 0.55); }
  50%      { text-shadow: 0 0 14px rgba(242, 143, 61, 0.95), 0 0 22px rgba(242, 143, 61, 0.4); }
}

/* ----- Instructions modal (body-level overlay) ----- */

.vpg-instructions-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s ease-out;
  z-index: 50;
}

.vpg-instructions-backdrop[data-state="visible"] {
  opacity: 1;
  pointer-events: auto;
}

.vpg-instructions-modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.96);
  width: 60%;
  max-width: 760px;
  min-height: 280px;
  background: #1a0d4a;
  /* Beveled light-blue double border:
     - outer light cyan line
     - dark inner stroke
     - inner light cyan highlight */
  border: 2px solid #b8e0f0;
  box-shadow:
    0 0 0 2px #1a0d4a,
    0 0 0 4px #b8e0f0,
    0 8px 32px rgba(0, 0, 0, 0.6);
  padding: 26px 36px;
  z-index: 60;
  opacity: 0;
  pointer-events: none;
  transition:
    opacity 0.18s ease-out,
    transform 0.18s ease-out;
}

.vpg-instructions-modal[data-state="visible"] {
  opacity: 1;
  pointer-events: auto;
  transform: translate(-50%, -50%) scale(1);
}

.vpg-instructions-title {
  font-family: var(--vpg-font-display);
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -1px;
  color: #ffffff;
  -webkit-text-stroke: 0.5px #000;
  margin-bottom: 18px;
  text-align: left;
}

.vpg-instructions-body p {
  font-family: var(--vpg-font-display);
  font-size: 18px;
  font-weight: 400;
  color: #ffffff;
  line-height: 1.4;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}

.vpg-instructions-body p:last-child { margin-bottom: 0; }

.vpg-instructions-body dl {
  display: grid;
  grid-template-columns: max-content max-content;
  justify-content: center;
  column-gap: 60px;
  row-gap: 6px;
  font-family: var(--vpg-font-display);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -1px;
  margin: 8px 0;
}

.vpg-instructions-body dt {
  color: #ffffff;
  -webkit-text-stroke: 0.5px #000;
  text-align: left;
}

.vpg-instructions-body dd {
  color: #ffffff;
  -webkit-text-stroke: 0.5px #000;
  text-align: right;
}

/* =========================================================================
   Z-button hint (small badge above the active item)
   ========================================================================= */

.vpg-z-hint {
  position: absolute;
  bottom: -32px;
  left: 50%;
  transform: translateX(-50%);
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: 11px;
  color: #aac;
  background: rgba(0,0,0,0.6);
  padding: 4px 8px;
  border-radius: 3px;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.vpg-menu-frame[data-instructions-state="hidden"] .vpg-z-hint {
  opacity: 0.85;
}
</style>
</head>
<body>

<div class="vpg-stage">
  <!-- The background image. Wider than viewport, slides horizontally
       when the page changes to reveal different regions. -->
  <div class="vpg-stage-bg"></div>

  <!-- Three menu panels, each full-screen. Only the active one is visible. -->
  <div class="vpg-menu-panel" data-page="multi-play"></div>
  <div class="vpg-menu-panel" data-page="single-play"></div>
  <div class="vpg-menu-panel" data-page="commissioner"></div>
</div>

<!-- Instructions modal (body-level overlay, not inside any panel) -->
<div class="vpg-instructions-backdrop" data-state="hidden"></div>
<div class="vpg-instructions-modal" data-state="hidden" role="dialog" aria-modal="true" aria-labelledby="vpg-instructions-title"></div>

<div class="vpg-status">
  <kbd>←</kbd> <kbd>→</kbd> / <kbd>Q</kbd> <kbd>E</kbd> page  &nbsp;
  <kbd>↑</kbd> <kbd>↓</kbd> item  &nbsp;
  <kbd>Z</kbd> instructions  &nbsp;
  <kbd>Enter</kbd> activate  &nbsp;
  <kbd>Esc</kbd> back
</div>

<script>
// =========================================================================
// VPG Engine — Main Menu Controller
// =========================================================================

// Inlined menu data (in production this loads from main-menu.json)
const MENU_DATA = {
  pages: {
    multiPlay: {
      id: "multi_play",
      displayName: "Multi Play",
      headingImage: "assets/textures/ui/heading_multiplay.png",
      menuItems: [
        { id: "exhibition", displayName: "Exhibition", target: "match_setup.exhibition",
          instructions: { title: "<< Exhibition Mode >>", blocks: [
            { type: "definitionList", items: [
              { term: "Single Match", definition: "1 vs. 1" },
              { term: "Tag Match", definition: "2 vs. 2" },
              { term: "Triple Threat Match", definition: "1 vs. 1 vs. 1" },
              { term: "Handicap Match", definition: "2 vs. 1" },
              { term: "Cage Match", definition: "1 vs. 1" }
            ]}
          ]}
        },
        { id: "royal_rumble", displayName: "Royal Rumble", target: "match_setup.royal_rumble",
          instructions: { title: "<< Royal Rumble Mode >>", blocks: [
            { type: "paragraph", text: "Four Superstars do battle until one Superstar survives all. Players can select the number of participants in the event. Up to 40 Superstars can participate." },
            { type: "paragraph", text: "When a player is eliminated, a new Superstar will come out of the locker room to join the match." }
          ]}
        },
        { id: "pay_per_view", displayName: "Pay Per View", target: "match_setup.pay_per_view",
          instructions: { title: "<< Pay-Per-View Mode >>", blocks: [
            { type: "paragraph", text: "Players can set up the name of the event, date, location, number of matches, and the match types." },
            { type: "paragraph", text: "It is possible to recreate historic shows from the past, or create an original show." }
          ]}
        },
        { id: "king_of_the_ring", displayName: "King of the Ring", target: "match_setup.king_of_the_ring",
          instructions: { title: "<< King of the Ring Mode >>", blocks: [
            { type: "paragraph", text: "The tournament to crown a new King of the Ring." },
            { type: "paragraph", text: "3 to 16 Superstars may participate in this event." }
          ]}
        },
        { id: "guest_referee", displayName: "Guest Referee", target: "match_setup.guest_referee",
          instructions: { title: "<< Guest Referee Mode >>", blocks: [
            { type: "paragraph", text: "Be a referee in a match." },
            { type: "paragraph", text: "Call it right down the middle and try not to get distracted." }
          ]}
        },
        { id: "ladder_match", displayName: "Ladder Match", target: "match_setup.ladder_match",
          instructions: { title: "<< Ladder Match Mode >>", blocks: [
            { type: "paragraph", text: "The first player to climb up the ladder and get the belt can leave the event with it." }
          ]}
        },
        { id: "ironman_match", displayName: "Ironman Match", target: "match_setup.ironman_match",
          instructions: { title: "<< Ironman Match Mode >>", blocks: [
            { type: "paragraph", text: "Two Superstars do battle to decide who is better." },
            { type: "paragraph", text: "The Superstar with the most falls in time limit. A fall is scored when a competitor is disqualified, submits, gets knocked out, or is pinned to the mat for a count of 3." }
          ]}
        }
      ]
    },
    singlePlay: {
      id: "single_play",
      displayName: "Single Play",
      headingImage: "assets/textures/ui/heading_singleplay.png",
      menuItems: [
        { id: "championship", displayName: "Championship", target: "single_play.championship",
          instructions: { title: "<< Championship Mode >>", blocks: [
            { type: "paragraph", text: "This is a quest mode. There are different scenarios for each of the championship belts in the World Wrestling Federation." },
            { type: "paragraph", text: "Difficulty setting of Superstars, scenarios, and events are different depending on the World Wrestling Federation title. Choose a belt and see if you can walk the long road to a World Wrestling Federation title." }
          ]}
        },
        { id: "survival", displayName: "Survival", target: "single_play.survival",
          instructions: { title: "<< Survival Mode >>", blocks: [
            { type: "paragraph", text: "Choose a Superstar and run the gauntlet of 100 participants." },
            { type: "paragraph", text: "How many Superstars can you defeat, and how much money can you earn?" }
          ]}
        }
      ]
    },
    commissioner: {
      id: "commissioner",
      displayName: "Commissioner",
      headingImage: "assets/textures/ui/heading_commissioner.png",
      menuItems: [
        { id: "smackdown_mall", displayName: "Smackdown Mall", target: "commissioner.smackdown_mall",
          instructions: { title: "<< Smackdown Mall >>", blocks: [
            { type: "paragraph", text: "Create your own original Superstar and use them in matches. You can spend points you earned in the game and purchase items in this shopping mall." },
            { type: "paragraph", text: "And, you can store those Superstars in the Controller Pak and exchange them with your friends." }
          ]}
        },
        { id: "options", displayName: "Options", target: "commissioner.options",
          instructions: { title: "<< Options Mode >>", blocks: [
            { type: "paragraph", text: "Adjust the in-game presentation." }
          ]}
        },
        { id: "arena_viewer", displayName: "Arena Viewer", target: "commissioner.arena_viewer",
          instructions: { title: "<< Arena Viewer >>", blocks: [
            { type: "paragraph", text: "View the arenas currently available in VPG." }
          ]}
        },
        { id: "controls", displayName: "Controls", target: "commissioner.controls",
          instructions: { title: "<< Controls Mode >>", blocks: [
            { type: "paragraph", text: "Set the inputs and controls for Virtual Pro Grappler." }
          ]}
        }
      ]
    }
  }
};

// -------------------------------------------------------------------------
// State
// -------------------------------------------------------------------------

const PAGE_ORDER = ["multiPlay", "singlePlay", "commissioner"];

const state = {
  pageIndex: 0,
  itemIndices: { multiPlay: 0, singlePlay: 0, commissioner: 0 },
  instructionsOpen: false
};

// -------------------------------------------------------------------------
// Rendering
// -------------------------------------------------------------------------

function renderPanels() {
  for (const pageKey of PAGE_ORDER) {
    const page = MENU_DATA.pages[pageKey];
    const panel = document.querySelector(`.vpg-menu-panel[data-page="${slug(pageKey)}"]`);
    panel.innerHTML = `
      <div class="vpg-menu-frame">
        <div class="vpg-menu-titlebar">
          <img class="vpg-menu-title-logo" src="${page.headingImage}" alt="${page.displayName}">
        </div>
        <ul class="vpg-menu-items" role="menu" aria-label="${page.displayName}">
          ${page.menuItems.map((item, i) => `
            <li class="vpg-menu-item" data-id="${item.id}" data-index="${i}"
                data-state="idle" role="menuitem" tabindex="-1">
              ${item.displayName}
            </li>
          `).join("")}
        </ul>
      </div>
    `;
  }
}

function updateActiveItem() {
  const pageKey = PAGE_ORDER[state.pageIndex];
  const page = MENU_DATA.pages[pageKey];
  const activeIndex = state.itemIndices[pageKey];
  const panel = document.querySelector(`.vpg-menu-panel[data-page="${slug(pageKey)}"]`);

  panel.querySelectorAll(".vpg-menu-item").forEach((el, i) => {
    el.dataset.state = (i === activeIndex) ? "active" : "idle";
  });

  // Update the body-level instructions modal content (always, even when
  // hidden, so opening it never shows stale content)
  const item = page.menuItems[activeIndex];
  const modal = document.querySelector(".vpg-instructions-modal");
  modal.innerHTML = renderInstructions(item.instructions);
}

function renderInstructions(instr) {
  const blocks = instr.blocks.map(block => {
    if (block.type === "paragraph") {
      return `<p>${escapeHTML(block.text)}</p>`;
    }
    if (block.type === "definitionList") {
      return `<dl>${
        block.items.map(it =>
          `<dt>${escapeHTML(it.term)}</dt><dd>${escapeHTML(it.definition)}</dd>`
        ).join("")
      }</dl>`;
    }
    return "";
  }).join("");

  return `
    <h3 id="vpg-instructions-title" class="vpg-instructions-title">${escapeHTML(instr.title)}</h3>
    <div class="vpg-instructions-body">${blocks}</div>
  `;
}

function updateInstructionsVisibility() {
  const backdrop = document.querySelector(".vpg-instructions-backdrop");
  const modal = document.querySelector(".vpg-instructions-modal");
  const visState = state.instructionsOpen ? "visible" : "hidden";
  backdrop.dataset.state = visState;
  modal.dataset.state = visState;
}

// -------------------------------------------------------------------------
// Page transition orchestrator
// -------------------------------------------------------------------------

// Timings (ms) — keep in sync with the CSS transition durations
const TIMING = {
  hideMenu:   150,  // panel fade-out
  zoomOut:    400,  // bg scales from 1.6 → 1.0, transform-origin animates to between
  slide:      250,  // hold beat at the wide view, repositioning origin for next region
  zoomIn:     400,  // bg scales from 1.0 → 1.6, focused on the new region
  showMenu:   150   // panel fade-in
};

// During a transition, swallow further left/right input but remember
// the latest direction so we can chain a follow-up transition when done.
let transitionInProgress = false;
let queuedDirection = null;  // null | -1 | +1

function requestPageChange(direction) {
  if (transitionInProgress) {
    // Player is mashing the button — remember the latest direction
    // and we'll fire it when the current transition finishes.
    queuedDirection = direction;
    return;
  }
  const newIndex = (state.pageIndex + direction + PAGE_ORDER.length) % PAGE_ORDER.length;
  if (newIndex === state.pageIndex) return;
  runPageTransition(newIndex);
}

async function runPageTransition(newPageIndex) {
  transitionInProgress = true;
  const stage = document.querySelector(".vpg-stage");

  // Stage 1: hide menu (panel fades out)
  hideAllPanels();
  await sleep(TIMING.hideMenu);

  // Stage 2: zoom out — bg scales down to fit whole panorama
  stage.dataset.transition = "zooming-out";
  stage.dataset.zoom = "out";
  await sleep(TIMING.zoomOut);

  // Stage 3: slide — pan to new region while still zoomed out
  state.pageIndex = newPageIndex;
  stage.dataset.transition = "sliding";
  stage.dataset.page = slug(PAGE_ORDER[newPageIndex]);
  await sleep(TIMING.slide);

  // Stage 4: zoom in — bg scales back up on the new region
  stage.dataset.transition = "zooming-in";
  delete stage.dataset.zoom;
  await sleep(TIMING.zoomIn);

  // Stage 5: show menu — new panel fades in. Also clear transition state.
  delete stage.dataset.transition;
  showActivePanel();
  // Update item state + instructions content while panel is fading in
  updateActiveItem();
  await sleep(TIMING.showMenu);

  transitionInProgress = false;

  // If the player mashed during the transition, chain into another one
  if (queuedDirection !== null) {
    const dir = queuedDirection;
    queuedDirection = null;
    requestPageChange(dir);
  }
}

function hideAllPanels() {
  // Closing instructions on page change is part of the spec
  state.instructionsOpen = false;
  updateInstructionsVisibility();
  document.querySelectorAll(".vpg-menu-panel").forEach(panel => {
    panel.dataset.active = "false";
  });
}

function showActivePanel() {
  document.querySelectorAll(".vpg-menu-panel").forEach((panel, i) => {
    panel.dataset.active = (i === state.pageIndex) ? "true" : "false";
  });
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// Initial page setup (no transition — just snap to the starting state)
function initialPageSetup() {
  const stage = document.querySelector(".vpg-stage");
  stage.dataset.page = slug(PAGE_ORDER[state.pageIndex]);
  showActivePanel();
  updateActiveItem();
}

// -------------------------------------------------------------------------
// Input handling
// -------------------------------------------------------------------------

document.addEventListener("keydown", (e) => {
  // Block all input except left/right while a transition is running.
  // Left/right gets queued by requestPageChange itself.
  if (transitionInProgress &&
      e.key !== "ArrowLeft" && e.key !== "ArrowRight" &&
      e.key !== "q" && e.key !== "Q" && e.key !== "e" && e.key !== "E") {
    e.preventDefault();
    return;
  }

  switch (e.key) {
    case "ArrowLeft":
    case "q":
    case "Q": {
      requestPageChange(-1);
      e.preventDefault();
      break;
    }
    case "ArrowRight":
    case "e":
    case "E": {
      requestPageChange(+1);
      e.preventDefault();
      break;
    }
    case "ArrowUp": {
      const pageKey = PAGE_ORDER[state.pageIndex];
      const len = MENU_DATA.pages[pageKey].menuItems.length;
      state.itemIndices[pageKey] = (state.itemIndices[pageKey] - 1 + len) % len;
      updateActiveItem();
      e.preventDefault();
      break;
    }
    case "ArrowDown": {
      const pageKey = PAGE_ORDER[state.pageIndex];
      const len = MENU_DATA.pages[pageKey].menuItems.length;
      state.itemIndices[pageKey] = (state.itemIndices[pageKey] + 1) % len;
      updateActiveItem();
      e.preventDefault();
      break;
    }
    case "z":
    case "Z": {
      state.instructionsOpen = !state.instructionsOpen;
      updateInstructionsVisibility();
      e.preventDefault();
      break;
    }
    case "Enter": {
      const pageKey = PAGE_ORDER[state.pageIndex];
      const item = MENU_DATA.pages[pageKey].menuItems[state.itemIndices[pageKey]];
      console.log("Activate target:", item.target);
      flashItem();
      e.preventDefault();
      break;
    }
    case "Escape": {
      if (state.instructionsOpen) {
        state.instructionsOpen = false;
        updateInstructionsVisibility();
      } else {
        console.log("Exit to title screen");
      }
      e.preventDefault();
      break;
    }
  }
});

// -------------------------------------------------------------------------
// Helpers
// -------------------------------------------------------------------------

function flashItem() {
  const pageKey = PAGE_ORDER[state.pageIndex];
  const panel = document.querySelector(`.vpg-menu-panel[data-page="${slug(pageKey)}"]`);
  const active = panel.querySelector(`.vpg-menu-item[data-state="active"]`);
  if (!active) return;
  active.style.transition = "none";
  active.style.color = "#fff";
  active.style.webkitTextStrokeWidth = "2px";
  setTimeout(() => {
    active.style.transition = "";
    active.style.color = "";
    active.style.webkitTextStrokeWidth = "";
  }, 100);
}

function slug(camelKey) {
  return camelKey.replace(/([A-Z])/g, "-$1").toLowerCase();
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

// -------------------------------------------------------------------------
// Init
// -------------------------------------------------------------------------

renderPanels();
initialPageSetup();
</script>
</body>
</html>
